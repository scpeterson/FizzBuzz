name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      MSBUILDDISABLENODEREUSE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check For Stale Project Paths
        run: |
          if git grep -n -E 'Scott\.FizzBuzz\.(Core|Console)(\.Tests)?([/\\])' -- README.md docs .run .github '*.sln' '*.csproj'; then
            echo 'Tracked files still contain stale Scott.FizzBuzz project paths.' >&2
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            global.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-docs.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Restore
        run: dotnet restore Scott.FunctionalProgrammingTriads.sln

      - name: Build
        run: dotnet build Scott.FunctionalProgrammingTriads.sln --configuration Release --no-restore -m:1

      - name: Install Docs Dependencies
        run: pip install -r requirements-docs.txt

      - name: Build Docs (Strict)
        run: mkdocs build --strict

      - name: Install Markdown Lint CLI
        run: npm install --global markdownlint-cli2

      - name: Markdown Lint
        run: markdownlint-cli2 --config .markdownlint.json "docs/**/*.md"

      - name: Link Check (Offline/Internal)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --config lychee.toml docs
          fail: true

      - name: Test Core With Coverage Thresholds
        run: >
          dotnet test Scott.FunctionalProgrammingTriads.Core.Tests/Scott.FunctionalProgrammingTriads.Core.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FunctionalProgrammingTriads.Core]*
          /p:ThresholdType=line
          /p:ThresholdStat=total
          /p:Threshold=60

      - name: Test Core Branch Coverage Threshold
        run: >
          dotnet test Scott.FunctionalProgrammingTriads.Core.Tests/Scott.FunctionalProgrammingTriads.Core.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FunctionalProgrammingTriads.Core]*
          /p:ThresholdType=branch
          /p:ThresholdStat=total
          /p:Threshold=50

      - name: Test Console Line Coverage Threshold
        run: >
          dotnet test Scott.FunctionalProgrammingTriads.Console.Tests/Scott.FunctionalProgrammingTriads.Console.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FunctionalProgrammingTriads.Console]*
          /p:ThresholdType=line
          /p:ThresholdStat=total
          /p:Threshold=75

      - name: Test Console Branch Coverage Threshold
        run: >
          dotnet test Scott.FunctionalProgrammingTriads.Console.Tests/Scott.FunctionalProgrammingTriads.Console.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FunctionalProgrammingTriads.Console]*
          /p:ThresholdType=branch
          /p:ThresholdStat=total
          /p:Threshold=80
